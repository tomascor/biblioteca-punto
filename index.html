<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Biblioteca de Punto</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --crema: #f5f0e8;
    --crema-oscuro: #ede5d5;
    --terracota: #c4614a;
    --terracota-claro: #d97b65;
    --mostaza: #c9922a;
    --mostaza-claro: #e8b84b;
    --marron: #5a3e2b;
    --marron-claro: #8b6347;
    --texto: #3a2a1a;
    --texto-suave: #7a6555;
    --sombra: rgba(90,62,43,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Lato', sans-serif;
    background: var(--crema);
    color: var(--texto);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--marron);
    padding: 20px 30px;
    display: flex;
    align-items: center;
    gap: 18px;
    box-shadow: 0 3px 12px rgba(0,0,0,0.2);
  }
  header .logo-icon {
    font-size: 2.2rem;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    color: var(--crema);
    font-size: 1.8rem;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  header h1 span {
    color: var(--mostaza-claro);
  }
  header .stats {
    margin-left: auto;
    color: var(--crema-oscuro);
    font-size: 0.85rem;
    text-align: right;
    opacity: 0.85;
  }

  /* LAYOUT */
  .container {
    display: flex;
    gap: 0;
    min-height: calc(100vh - 72px);
  }

  /* SIDEBAR */
  aside {
    width: 280px;
    min-width: 260px;
    background: var(--crema-oscuro);
    border-right: 2px solid #ddd0bc;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .search-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .search-group label {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--marron-claro);
  }
  .search-group input,
  .search-group select {
    padding: 9px 13px;
    border: 1.5px solid #cfc0aa;
    border-radius: 8px;
    font-family: 'Lato', sans-serif;
    font-size: 0.9rem;
    background: white;
    color: var(--texto);
    transition: border-color 0.2s;
  }
  .search-group input:focus,
  .search-group select:focus {
    outline: none;
    border-color: var(--terracota);
  }

  .btn-limpiar {
    padding: 9px;
    background: var(--terracota);
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'Lato', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: background 0.2s;
  }
  .btn-limpiar:hover { background: var(--terracota-claro); }

  .sidebar-stats {
    background: white;
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 0.82rem;
    color: var(--texto-suave);
    border: 1px solid #ddd0bc;
  }
  .sidebar-stats strong {
    color: var(--marron);
    font-size: 1.3rem;
    display: block;
  }

  .tipos-lista {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .tipo-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 10px;
    border-radius: 7px;
    cursor: pointer;
    transition: background 0.15s;
    font-size: 0.88rem;
  }
  .tipo-item:hover { background: white; }
  .tipo-item.activo { background: var(--terracota); color: white; }
  .tipo-item .badge {
    background: var(--crema-oscuro);
    color: var(--marron-claro);
    border-radius: 12px;
    padding: 1px 8px;
    font-size: 0.75rem;
    font-weight: 700;
  }
  .tipo-item.activo .badge { background: rgba(255,255,255,0.3); color: white; }

  /* MAIN CONTENT */
  main {
    flex: 1;
    padding: 24px;
    overflow-y: auto;
  }

  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    gap: 12px;
  }
  .resultados-texto {
    font-size: 0.88rem;
    color: var(--texto-suave);
  }
  .resultados-texto strong { color: var(--marron); }

  /* GRID */
  .galeria {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
  }

  /* TARJETA */
  .tarjeta {
    background: white;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 2px 10px var(--sombra);
    transition: transform 0.2s, box-shadow 0.2s;
    display: flex;
    flex-direction: column;
    border: 1.5px solid transparent;
  }
  .tarjeta:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 24px var(--sombra);
    border-color: var(--terracota-claro);
  }

  .tarjeta-img {
    position: relative;
    width: 100%;
    padding-top: 130%;
    background: var(--crema-oscuro);
    cursor: pointer;
    overflow: hidden;
  }
  .tarjeta-img img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s;
  }
  .tarjeta:hover .tarjeta-img img { transform: scale(1.04); }

  .tarjeta-img .placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--marron-claro);
    font-size: 2.5rem;
    gap: 8px;
  }
  .tarjeta-img .placeholder span {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .badge-nuevo {
    position: absolute;
    top: 10px;
    right: 10px;
    background: var(--mostaza);
    color: white;
    font-size: 0.65rem;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 20px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .lupa-btn {
    position: absolute;
    bottom: 10px;
    right: 10px;
    background: rgba(90,62,43,0.75);
    color: white;
    border: none;
    border-radius: 50%;
    width: 34px;
    height: 34px;
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .tarjeta:hover .lupa-btn { opacity: 1; }

  .tarjeta-info {
    padding: 13px 14px 14px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    flex: 1;
  }
  .tarjeta-nombre {
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--marron);
    line-height: 1.3;
  }
  .tarjeta-disenadora {
    font-size: 0.78rem;
    color: var(--terracota);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .tarjeta-tipo {
    display: inline-block;
    background: var(--crema-oscuro);
    color: var(--marron-claro);
    font-size: 0.72rem;
    font-weight: 700;
    padding: 2px 9px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    width: fit-content;
  }
  .tarjeta-obs {
    font-size: 0.78rem;
    color: var(--texto-suave);
    line-height: 1.4;
    margin-top: 3px;
  }
  .tarjeta-btn {
    margin-top: auto;
    padding-top: 10px;
    display: flex;
    gap: 7px;
  }
  .btn-pdf {
    flex: 1;
    padding: 8px;
    background: var(--marron);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 0.78rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: background 0.2s;
    text-decoration: none;
    text-align: center;
  }
  .btn-pdf:hover { background: var(--terracota); }

  /* MODAL imagen */
  .modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.82);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal.visible { display: flex; }
  .modal img {
    max-width: 90vw;
    max-height: 90vh;
    border-radius: 8px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }
  .modal-cerrar {
    position: absolute;
    top: 20px;
    right: 24px;
    color: white;
    font-size: 2rem;
    cursor: pointer;
    background: none;
    border: none;
    line-height: 1;
  }

  /* Sin resultados */
  .sin-resultados {
    grid-column: 1/-1;
    text-align: center;
    padding: 60px 20px;
    color: var(--texto-suave);
  }
  .sin-resultados .icono { font-size: 3rem; margin-bottom: 12px; }

  @media (max-width: 700px) {
    .container { flex-direction: column; }
    aside { width: 100%; min-width: unset; }
    header h1 { font-size: 1.3rem; }
    header .stats { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-icon">🧶</div>
  <h1>Mi Biblioteca <span>de Punto</span></h1>
  <div class="stats" id="headerStats">Cargando...</div>
</header>

<div class="container">
  <aside>
    <div class="search-group">
      <label>Buscar por nombre</label>
      <input type="text" id="buscadorNombre" placeholder="Nombre del diseño…" oninput="filtrar()">
    </div>
    <div class="search-group">
      <label>Diseñadora</label>
      <select id="filtroDisenadora" onchange="filtrar()">
        <option value="">Todas las diseñadoras</option>
      </select>
    </div>
    <div class="search-group">
      <label>Tipo</label>
      <select id="filtroTipo" onchange="filtrar()">
        <option value="">Todos los tipos</option>
      </select>
    </div>
    <button class="btn-limpiar" onclick="limpiarFiltros()">✕ Limpiar filtros</button>

    <div class="sidebar-stats">
      <strong id="totalMostrados">—</strong>
      diseños encontrados
    </div>

    <div>
      <div style="font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--marron-claro);margin-bottom:8px;">Por tipo</div>
      <div class="tipos-lista" id="tiposLista"></div>
    </div>
  </aside>

  <main>
    <div class="toolbar">
      <div class="resultados-texto" id="textoResultados"></div>
    </div>
    <div class="galeria" id="galeria"></div>
  </main>
</div>

<!-- Modal imagen ampliada -->
<div class="modal" id="modal" onclick="cerrarModal()">
  <button class="modal-cerrar" onclick="cerrarModal()">✕</button>
  <img id="modalImg" src="" alt="">
</div>

<script>
let todosLosDatos = [];
let filtroTipoActivo = '';

async function cargarDatos() {
  try {
    const resp = await fetch('datos.json?v=' + Date.now());
    todosLosDatos = await resp.json();
    inicializar();
  } catch(e) {
    document.getElementById('galeria').innerHTML = '<div class="sin-resultados"><div class="icono">📂</div><p>No se encontró el archivo datos.json</p></div>';
  }
}

function inicializar() {
  // Poblar selects
  const disenadorasSet = new Set(todosLosDatos.map(d => d.disenadora).filter(Boolean));
  const tiposSet = new Set(todosLosDatos.map(d => d.tipo).filter(Boolean));

  const selD = document.getElementById('filtroDisenadora');
  [...disenadorasSet].sort().forEach(d => {
    const opt = document.createElement('option');
    opt.value = d; opt.textContent = d;
    selD.appendChild(opt);
  });

  const selT = document.getElementById('filtroTipo');
  [...tiposSet].sort().forEach(t => {
    const opt = document.createElement('option');
    opt.value = t; opt.textContent = t;
    selT.appendChild(opt);
  });

  document.getElementById('headerStats').textContent = `${todosLosDatos.length} diseños · ${disenadorasSet.size} diseñadoras`;

  actualizarTiposLista(todosLosDatos);
  filtrar();
}

function filtrar() {
  const nombre = document.getElementById('buscadorNombre').value.toLowerCase().trim();
  const disenadora = document.getElementById('filtroDisenadora').value;
  const tipo = document.getElementById('filtroTipo').value || filtroTipoActivo;

  const resultado = todosLosDatos.filter(d => {
    const okNombre = !nombre || d.nombre.toLowerCase().includes(nombre);
    const okDis = !disenadora || d.disenadora === disenadora;
    const okTipo = !tipo || d.tipo === tipo;
    return okNombre && okDis && okTipo;
  });

  renderGaleria(resultado);
  document.getElementById('totalMostrados').textContent = resultado.length;
  document.getElementById('textoResultados').innerHTML = `Mostrando <strong>${resultado.length}</strong> de <strong>${todosLosDatos.length}</strong> diseños`;
  actualizarTiposLista(resultado);
}

function renderGaleria(items) {
  const galeria = document.getElementById('galeria');
  if (!items.length) {
    galeria.innerHTML = '<div class="sin-resultados"><div class="icono">🔍</div><p>No se encontraron diseños con esos filtros.</p></div>';
    return;
  }

  galeria.innerHTML = items.map(d => {
    const esNuevo = d.nuevo ? '<div class="badge-nuevo">Nuevo</div>' : '';
    const imgHtml = d.miniatura
      ? `<img src="${d.miniatura}" alt="${d.nombre}" loading="lazy">`
      : `<div class="placeholder">🧶<span>PDF</span></div>`;
    const obs = d.observaciones ? `<div class="tarjeta-obs">${d.observaciones}</div>` : '';

    return `
      <div class="tarjeta">
        <div class="tarjeta-img" onclick="abrirModal('${d.miniatura || ''}')">
          ${imgHtml}
          ${esNuevo}
          ${d.miniatura ? '<button class="lupa-btn" title="Ampliar">🔍</button>' : ''}
        </div>
        <div class="tarjeta-info">
          <div class="tarjeta-nombre">${d.nombre}</div>
          <div class="tarjeta-disenadora">${d.disenadora || ''}</div>
          <div class="tarjeta-tipo">${d.tipo || 'Sin clasificar'}</div>
          ${obs}
          <div class="tarjeta-btn">
            <a class="btn-pdf" href="${d.url_pdf}" target="_blank" rel="noopener">📄 Ver PDF</a>
          </div>
        </div>
      </div>`;
  }).join('');
}

function actualizarTiposLista(items) {
  const conteo = {};
  items.forEach(d => {
    const t = d.tipo || 'Sin clasificar';
    conteo[t] = (conteo[t] || 0) + 1;
  });

  const lista = document.getElementById('tiposLista');
  lista.innerHTML = Object.entries(conteo).sort((a,b) => b[1]-a[1]).map(([tipo, n]) => `
    <div class="tipo-item ${filtroTipoActivo === tipo ? 'activo' : ''}" onclick="filtrarPorTipo('${tipo}')">
      <span>${tipo}</span>
      <span class="badge">${n}</span>
    </div>`).join('');
}

function filtrarPorTipo(tipo) {
  filtroTipoActivo = filtroTipoActivo === tipo ? '' : tipo;
  filtrar();
}

function limpiarFiltros() {
  document.getElementById('buscadorNombre').value = '';
  document.getElementById('filtroDisenadora').value = '';
  document.getElementById('filtroTipo').value = '';
  filtroTipoActivo = '';
  filtrar();
}

function abrirModal(src) {
  if (!src) return;
  document.getElementById('modalImg').src = src;
  document.getElementById('modal').classList.add('visible');
}

function cerrarModal() {
  document.getElementById('modal').classList.remove('visible');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') cerrarModal(); });

cargarDatos();
</script>
</body>
</html>
